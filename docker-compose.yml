version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: aim-trainer-db
    environment:
      MONGO_INITDB_DATABASE: aim_trainer
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aim-trainer-network

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aim-trainer-backend
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DB_NAME: aim_trainer
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - aim-trainer-network
    restart: unless-stopped

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aim-trainer-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - aim-trainer-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  aim-trainer-network:
    driver: bridge
